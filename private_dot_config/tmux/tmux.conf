setw -gq mode-keys vi
set -g prefix C-a

set-window-option -gq mouse on
set-window-option -gq mode-mouse on
set-option -gq status-utf8 on
set-window-option -gq utf8 on
set-option -g detach-on-destroy off
set -g default-command "$SHELL"

set -g extended-keys on
set -g extended-keys-format csi-u

#base
set -g default-terminal "screen-256color"

# Undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# The first window is 1
set -g base-index 1
# The first pane is 1
setw -g pane-base-index 1
# Window 0 is actually 10
bind 0 select-window -t :10
# Update window numbers when any are closed
set -g renumber-windows on
# Automatically name windows
setw -g automatic-rename on

# Notifying if other windows has activities
set-option -g visual-activity on
setw -g monitor-activity off

# Status on top
set -g status-position bottom

# Change default work dir
bind -N 'Change default work dir' W attach -c '#{pane_current_path}'\; display-message "Set work dir to #{pane_current_path}"

# Jump to marked pane
bind -N 'Jump to marked pane' Q switch-client -t'{marked}'

# Allow for creating/switching-to sessions based off filesystem directories
bind -n C-f display-popup -h 20 -E "tmux-sessionizer"

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi _ send-keys -X start-of-line

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind r command-prompt -I "#W" "rename-window '%%'"
bind R source ~/.config/tmux/tmux.conf \; display-message "Config reloaded.."

# Lazygit Popup
source-file ~/.config/tmux/plugins/lazygit-popup/main

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?l?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"
bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -t:.+'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'C-Space' select-pane -t:.+

# rebind clear screen to <prefix> C-l
bind C-l send-keys 'C-l'

## List of plugins

# TMUX Plugin Manager
# auto install tpm
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'mkdir -p ~/.config/tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
# set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -agF status-right "#{E:@catppuccin_status_battery}"

set -g @plugin 'tmux-plugins/tpm'

# Sensible Settings
set -g @plugin 'tmux-plugins/tmux-sensible'

# Periodically save tmux session, restore saved tmux session on startup
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @resurrect-dir '$HOME/.config/tmux/resurrect'

# Allow for saving tmux session saving and restoration
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-boot-options 'iterm'

# Popup action menus for tmux commands
set -g @plugin 'jaclu/tmux-menus'

# Tmux Thumbs - allows copying matched strings to clipboard
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-command 'echo -n {} | pbcopy'

# run-shell ~/.config/tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

